<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux: Choose Freedom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1a1a1a;
            --accent-color: #f7b500; /* Darker Linux Yellow for contrast */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .quote-container {
            margin-bottom: 2rem;
            max-width: 800px;
            padding: 0 20px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s forwards ease-out;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin: 0;
        }

        .highlight {
            color: var(--accent-color);
        }

        .tux-container {
            width: clamp(200px, 40vw, 450px);
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 1s 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 40px rgba(0, 0, 0, 0.1));
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #888;
        }

        @keyframes fadeInDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Subtle background glow */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(247, 181, 0, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div class="quote-container">
        <h1>In a world without <span class="highlight">walls</span>,<br>who needs <span class="highlight">windows</span>?</h1>
        <p style="font-weight: 300; margin-top: 10px; opacity: 0.8;">Choose Freedom. Choose Linux.</p>
    </div>

    <div class="tux-container">
        <img src="tux.png" alt="Tux, the Linux Penguin">
    </div>

    <div class="footer">
        Powered by Open Source
    </div>
</body>
</html>
