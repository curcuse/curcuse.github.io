<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Dino Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 200px;
            border-bottom: 2px solid #535353;
            background-color: #f7f7f7;
        }

        canvas {
            display: block;
        }

        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            color: #535353;
            font-family: monospace;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }

        #game-over h1 {
            color: #535353;
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        #restart-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        #restart-btn svg {
            fill: #535353;
            width: 36px;
            height: 36px;
        }

        .instructions {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">00000</div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="game-over">
            <h1>G A M E  O V E R</h1>
            <button id="restart-btn" onclick="resetGame()">
                <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            </button>
        </div>

        <div class="instructions">Press Space or Tap to Jump</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');

        // Game state
        let gameRunning = true;
        let score = 0;
        let gameSpeed = 5;
        let animationId;

        // Resize canvas
        canvas.width = 800;
        canvas.height = 200;

        // Dino properties
        const dino = {
            x: 50,
            y: 150,
            width: 44,
            height: 47,
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false,
            color: '#535353'
        };

        // Obstacles
        let obstacles = [];
        const obstacleWidth = 20;
        const obstacleHeight = 40;

        function drawDino() {
            ctx.fillStyle = dino.color;
            // Simplified Dino Shape (Pixel style)
            // Body
            ctx.fillRect(dino.x + 10, dino.y, 25, 35);
            // Head
            ctx.fillRect(dino.x + 25, dino.y - 12, 18, 15);
            // Tail
            ctx.fillRect(dino.x, dino.y + 10, 10, 15);
            // Legs
            ctx.fillRect(dino.x + 12, dino.y + 35, 8, 12);
            ctx.fillRect(dino.x + 24, dino.y + 35, 8, 12);
        }

        function drawCactus(x, y, h) {
            ctx.fillStyle = '#535353';
            // Main stem
            ctx.fillRect(x + 8, y + (40 - h), 6, h);
            // Arms
            if (h > 20) {
                ctx.fillRect(x, y + (40 - h) + 10, 8, 4); // Left arm
                ctx.fillRect(x, y + (40 - h) + 5, 4, 10);
                
                ctx.fillRect(x + 14, y + (40-h) + 15, 8, 4); // Right arm
                ctx.fillRect(x + 18, y + (40-h) + 10, 4, 10);
            }
        }

        function createObstacle() {
            const height = Math.random() * (45 - 30) + 30;
            obstacles.push({
                x: canvas.width,
                y: 200 - height,
                width: 25,
                height: height
            });
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dino Physics
            if (!dino.grounded) {
                dino.dy += dino.gravity;
                dino.y += dino.dy;
            }

            if (dino.y > 150) {
                dino.y = 150;
                dino.dy = 0;
                dino.grounded = true;
            }

            drawDino();

            // Obstacle logic
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - (Math.random() * 400 + 200)) {
                createObstacle();
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                drawCactus(obstacles[i].x, obstacles[i].y, obstacles[i].height);

                // Collision Detection
                if (
                    dino.x < obstacles[i].x + obstacles[i].width &&
                    dino.x + dino.width > obstacles[i].x &&
                    dino.y < obstacles[i].y + obstacles[i].height &&
                    dino.y + dino.height > obstacles[i].y
                ) {
                    endGame();
                }

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    updateScoreDisplay();
                }
            }

            // Speed up
            gameSpeed += 0.001;

            animationId = requestAnimationFrame(update);
        }

        function updateScoreDisplay() {
            let s = score.toString();
            while (s.length < 5) s = '0' + s;
            scoreElement.innerText = s;
        }

        function jump() {
            if (dino.grounded && gameRunning) {
                dino.dy = -dino.jumpForce;
                dino.grounded = false;
            }
        }

        function endGame() {
            gameRunning = false;
            gameOverElement.style.display = 'block';
            cancelAnimationFrame(animationId);
        }

        function resetGame() {
            score = 0;
            gameSpeed = 5;
            obstacles = [];
            dino.y = 150;
            dino.dy = 0;
            dino.grounded = true;
            gameRunning = true;
            gameOverElement.style.display = 'none';
            updateScoreDisplay();
            update();
        }

        // Controls
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            jump();
            e.preventDefault();
        });

        canvas.addEventListener('mousedown', () => {
            jump();
        });

        // Start
        update();

    </script>
</body>
</html>
