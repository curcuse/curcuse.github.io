<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>curcuse</title>
  <style>
    body {
      background-color: #0c0c0c;
      color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 2rem;
      overflow-x: hidden;
    }

    a {
      color: #ffffff;
      text-decoration: none;
    }

    a:hover {
      background-color: #ffffff;
      color: #0c0c0c;
    }

    .prompt {
      color: #ffffff;
      font-weight: bold;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background-color: #ffffff;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .output-line {
      margin-bottom: 0.5rem;
    }

    .ascii-art {
      font-size: 0.8rem;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div>
    <div class="output-line"><span class="prompt">curcuse@github:~$</span> ./show_last_chess_game.sh</div>
    <div class="output-line">Loading last played game on Lichess for account 'byteprogress'...</div>
    <div class="output-line">
      <iframe src="https://lichess.org/embed/game/Ph0E0GZw?theme=auto&bg=auto" width="100%" height="560" frameborder="0"
        style="max-width: 340px; border: 1px solid #ffffff; margin-top: 10px; opacity: 0.9;"></iframe>
    </div>
    <br>
  </div>
</body>

</html>
